server:
  port: 8081

spring:
  application:
    name: app-cs-service

ai:
  gateway:
    url: ${AI_GATEWAY_URL:http://localhost:9080/ai/v1/chat/completions}
    api-key: ${AI_GATEWAY_API_KEY:test-api-key}
    system-code: ${AI_GATEWAY_SYSTEM_CODE:CS}
    task-type: ${AI_GATEWAY_TASK_TYPE:COUNSEL_SUMMARY}
    model: ${AI_GATEWAY_MODEL:internal-counsel-mock-llm}

management:
  endpoints:
    web:
      exposure:
        include: health
